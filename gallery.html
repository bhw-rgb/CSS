<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

         .container {
            display: grid;
            padding: 10%;
            gap: 10px;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(4, 500px);
            grid-template-areas: 
                "img1 img2 img3"
                "img4 img5 img6";      
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .container:hover .item img:not(:hover) {
            filter: grayscale(1);
            opacity: 0.5;
        }

        .img1 {
            grid-area: img1;
        }

        .img2 {
            grid-area: img2;
        }

        .img3 {
            grid-area: img3;
        }

        .img4 {
            grid-area: img4;
        }

        .img5 {
            grid-area: img5;
        }

        .img6 {
            grid-area: img6;
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="item img1"><img src="https://plus.unsplash.com/premium_photo-1669839137069-4166d6ea11f4?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Z2FsYXh5fGVufDB8fDB8fHww" alt="Img1"></div>
        <div class="item img2"><img src="https://images.unsplash.com/photo-1538370965046-79c0d6907d47?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Z2FsYXh5fGVufDB8fDB8fHww" alt="Img2"></div>
        <div class="item img3"><img src="https://plus.unsplash.com/premium_photo-1661962607720-d23f056f56e6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8Z2FsYXh5fGVufDB8fDB8fHww" alt="Img3"></div>
        <div class="item img4"><img src="https://plus.unsplash.com/premium_photo-1663047540698-12e93c082dda?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fGdhbGF4eXxlbnwwfHwwfHx8MA%3D%3D" alt="Img4"></div>
        <div class="item img5"><img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGdhbGF4eXxlbnwwfHwwfHx8MA%3D%3D" alt="Img5"></div>
        <div class="item img6"><img src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjZ8fGdhbGF4eXxlbnwwfHwwfHx8MA%3D%3D" alt="Img6"></div>
    </div>
    
</body>

</html>
