<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
        }

        .box {
            background-color: skyblue;
            border: 1px solid black;
            flex: 1;
        }

        /* Media Query */
        @media (max-width: 350px) {
            .container {
                flex-direction: column;
            }

            .box {
                background-color: orange;
            }
        }

    </style>

</head>
<body>
     <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>
</body>
</html>
