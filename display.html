<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a {
            background-color: skyblue;
        }

        .display div {
            background-color: orange;
        }

        span {
            background-color: yellow;
        }
        
        .display {
            text-align: center;
        }

    </style>
</head>

<body>
    <div class="display">
        <!-- Inline -->
        <a href="">Visit Google</a>
        <a href="">Visit Naver</a>

        <hr>

        <!-- Block-level -->
        <div>Visit Goole</div>
        <div>Visit Naver</div>

        <hr>

        <!-- Mix -->
        <span>Inline 1</span>
        <span>Inline 2</span>
        <a href="" style="display: block;">Inline 3</a>
        <div style="display: inline;">Block 1</div>
        <span>Inline 4</span>
    </div>
</body>

</html>
