<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="http://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <style>

        body {
            margin: 0px;
            font-family: "Datatype", sans-serif;
        }

        a {
            text-decoration: none;
            color: black;
        }

        ul {
            margin: 0px;
            padding: 0px;
        }

        .navbar {
            background-color: antiquewhite;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px;
        }

        .navbar__menu {
            list-style: none;
            display: flex;
            padding: 0px;
        }

        .navbar__logo a {
            font-size: 1.5rem;
        }

        .navbar__icons li {
            list-style: none;
            font-size: 20px;
        }

        .navbar__menu li {
            padding: 16px 12px;
        }

        .navbar__menu li:hover {
            background-color: white;
            border-radius: 12px;
        }

        .navbar__icons {
            display: flex;
        }

        @media (max-width: 400px) {
            .navbar {
                flex-direction: column;
                align-items: center;
            }

            .navbar__menu {
                flex-direction: column;
                text-align: center;
                width: 100%;
            }
        }
    </style>

</head>

<body>
    <nav class="navbar">
        <div class="navbar__logo">
            <a href="#">
                <i class="fa-brands fa-dev"> bhw rgb</i>
            </a>
        </div>

        <ul class="navbar__menu">
            <li><a href="">About</a></li>
            <li><a href="">Resume</a></li>
            <li><a href="">Gallery</a></li>
        </ul>

        <ul class="navbar__icons">
            <li><a href="https://github.com/bhw-rgb"><i class="fa-brands fa-github"></i></a></li>
        </ul>
    </nav>
</body>

</html>
